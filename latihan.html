<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .tableChallenge{
        border-collapse: collapse;
        width: 100%;
        margin: auto;
        font-family: 'Times New Roman', Times, serif;
    }

    .tableChallenge td, .tableChallenge th{
        border: 1px solid black;
        text-align: center;
    }

    .judul{
        background-color: blue;
        font-weight: bold;
        color: white;
    }
</style>
<body>
    <table class="tableChallenge">
        <tr class="judul">
            <th rowspan="2">No</th>
            <th rowspan="2">Nama</th>
            <th colspan="3">Nilai</th>
        </tr>

        <tr class="judul">
            <th>Tugas</th>
            <th>UTS</th>
            <th>UAS</th>           
        </tr>

        <tr>
            <td>1</td>
            <td>Andi</td>
            <td>80</td>
            <td>75</td>
            <td>88</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Budi</td>
            <td>70</td>
            <td>85</td>
            <td>90</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Citra</td>
            <td>90</td>
            <td>92</td>
            <td>95</td>
        </tr>
    </table>
</body>
</html>
