<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Element</title>
</head>
<body>
    <!-- Bentuk list berurutan -->
     <ol>
    <li>lala</li>
    <li>lili</li>
    <li>lulu</li>
    <li>lolo</li>
    <li>lele</li>
     </ol>
     
<!-- Bentuk list tidak berurutan -->
 <ul>
    <li>menye</li>
    <li>lah</li>
    <li>luh</li>
 </ul>
 
</body>
</html>
